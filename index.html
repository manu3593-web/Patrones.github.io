<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pattern Analyzer Pro PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0f172a;       /* Azul muy oscuro, relax visual */
            --card: #1e293b;     /* Gris azulado */
            --accent: #38bdf8;   /* Cian suave */
            --text: #f1f5f9;     /* Blanco roto */
            --success: #4ade80;  /* Verde éxito */
            --danger: #f43f5e;   /* Rojo advertencia */
            --muted: #94a3b8;    /* Texto secundario */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: env(safe-area-inset-top) 15px 140px 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        #installBtn {
            display: none;
            background: linear-gradient(135deg, var(--success), #22c55e);
            color: #064e3b; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; width: 100%;
            max-width: 500px; margin: 10px 0; cursor: pointer;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { margin: 0; font-size: 1.6rem; color: var(--accent); letter-spacing: -1px; }
        
        /* Contador Estilizado */
        .counter-badge {
            background: var(--card);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
            display: inline-block;
        }

        .controls {
            background: var(--card); padding: 20px; border-radius: 20px;
            border: 1px solid #334155; width: 100%; max-width: 500px;
            display: grid; gap: 15px;
        }

        .row { display: flex; gap: 12px; }
        .field { display: flex; flex-direction: column; flex: 1; }
        label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
        
        input {
            background: #0f172a; border: 1px solid #475569;
            color: white; padding: 14px; border-radius: 10px; font-size: 1.1rem;
        }

        .btn-gen {
            background: var(--accent); color: #0f172a;
            border: none; padding: 16px; border-radius: 10px;
            font-weight: bold; cursor: pointer; font-size: 1rem;
            transition: transform 0.1s;
        }
        .btn-gen:active { transform: scale(0.97); }

        #results {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            gap: 15px; width: 100%; max-width: 900px; margin-top: 30px;
        }

        .pattern-card {
            background: var(--card); border-radius: 15px;
            padding: 12px; border: 1px solid #334155;
            display: flex; flex-direction: column; align-items: center;
            position: relative; transition: all 0.2s ease;
        }
        .pattern-card.is-used { border-color: var(--success); background: #064e3b; opacity: 0.9; }
        .pattern-card.is-used::after {
            content: '✓'; position: absolute; top: 8px; right: 10px;
            color: var(--success); font-weight: bold; font-size: 1.2rem;
        }

        canvas { background: #000; border-radius: 10px; width: 100%; height: auto; margin-bottom: 8px; }
        .p-path { font-family: 'monospace'; color: var(--accent); font-weight: bold; }
        .p-diff { font-size: 0.65rem; color: var(--muted); margin-top: 4px; }

        /* Footer con Toolbar de Datos */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 15px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px); 
            display: flex; flex-direction: column; gap: 10px;
            align-items: center; border-top: 1px solid #334155;
        }
        .btn-group { display: flex; gap: 8px; width: 100%; max-width: 500px; }
        .btn-tool {
            flex: 1; padding: 10px; border-radius: 8px; font-size: 0.7rem;
            font-weight: bold; cursor: pointer; border: 1px solid #475569;
            background: #1e293b; color: var(--text);
        }
        .btn-danger { color: var(--danger); border-color: var(--danger); }
    </style>
</head>
<body>

    <button id="installBtn">📲 INSTALAR PATTERN PRO</button>

    <div class="header">
        <h1>Pattern Analyzer Pro</h1>
        <div id="usedCounter" class="counter-badge">Usados: 0</div>
    </div>

    <div class="controls">
        <div class="row">
            <div class="field">
                <label>Nodo Inicio</label>
                <input type="number" id="startNode" min="1" max="9" value="9">
            </div>
            <div class="field">
                <label>Longitud</label>
                <input type="number" id="pathLen" min="4" max="9" value="4">
            </div>
        </div>
        <button class="btn-gen" onclick="ejecutar()">GENERAR PATRONES</button>
    </div>

    <div id="stats" style="margin-top: 15px; font-size: 0.8rem; color: #94a3b8; text-align: center;"></div>
    <div id="results"></div>

    <div class="footer">
        <div class="btn-group">
            <button class="btn-tool" onclick="exportarDatos()">📤 Exportar</button>
            <button class="btn-tool" onclick="importarDatos()">📥 Importar</button>
            <button class="btn-tool btn-danger" onclick="limpiarHistorial()">🧹 Limpiar</button>
        </div>
    </div>

    <script>
        /* --- LÓGICA PWA --- */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('installBtn').style.display = 'none';
            }
        });

        /* --- LÓGICA DEL ALGORITMO --- */
        const skips = {'1-3':2,'3-1':2,'1-7':4,'7-1':4,'3-9':6,'9-3':6,'7-9':8,'9-7':8,'4-6':5,'6-4':5,'2-8':5,'8-2':5,'1-9':5,'9-1':5,'3-7':5,'7-3':5};
        const coords = {1:[0,0],2:[1,0],3:[2,0],4:[0,1],5:[1,1],6:[2,1],7:[0,2],8:[1,2],9:[2,2]};
        
        let usedPatterns = JSON.parse(localStorage.getItem('android_pwa_used') || '[]');

        function actualizarContador() {
            document.getElementById('usedCounter').innerText = `Usados: ${usedPatterns.length}`;
        }

        function calcularDificultad(path) {
            let score = 0;
            for (let i = 0; i < path.length - 1; i++) {
                let p1 = coords[path[i]], p2 = coords[path[i+1]];
                score += Math.pow(p2[0]-p1[0], 2) + Math.pow(p2[1]-p1[1], 2);
                if (i > 0) {
                    let p0 = coords[path[i-1]], v1 = [p1[0]-p0[0], p1[1]-p0[1]], v2 = [p2[0]-p1[0], p2[1]-p1[1]];
                    if (v1[0] !== v2[0] || v1[1] !== v2[1]) score += 3;
                }
            }
            return score;
        }

        function ejecutar() {
            const start = parseInt(document.getElementById('startNode').value);
            const len = parseInt(document.getElementById('pathLen').value);
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Procesando algoritmos...</p>";

            setTimeout(() => {
                let patterns = [];
                findRecursive(start, [start], len, patterns);
                patterns.sort((a, b) => calcularDificultad(a) - calcularDificultad(b));
                document.getElementById('stats').innerText = `${patterns.length} trayectorias analizadas.`;
                render(patterns);
                actualizarContador();
            }, 50);
        }

        function findRecursive(curr, path, target, results) {
            if (path.length === target) { results.push([...path]); return; }
            for (let next = 1; next <= 9; next++) {
                if (!path.includes(next)) {
                    const skip = skips[`${curr}-${next}`];
                    if (!skip || path.includes(skip)) {
                        path.push(next);
                        findRecursive(next, path, target, results);
                        path.pop();
                    }
                }
            }
        }

        function render(patterns) {
            const container = document.getElementById('results');
            container.innerHTML = "";
            patterns.forEach(p => {
                const pId = p.join('');
                const card = document.createElement('div');
                card.className = `pattern-card ${usedPatterns.includes(pId) ? 'is-used' : ''}`;
                card.onclick = () => {
                    if(usedPatterns.includes(pId)) usedPatterns = usedPatterns.filter(id => id !== pId);
                    else usedPatterns.push(pId);
                    localStorage.setItem('android_pwa_used', JSON.stringify(usedPatterns));
                    card.classList.toggle('is-used');
                    actualizarContador();
                };
                
                card.innerHTML = `<canvas width="120" height="120"></canvas>
                                  <div class="p-path">${p.join('-')}</div>
                                  <div class="p-diff">Peso Logístico: ${calcularDificultad(p).toFixed(1)}</div>`;
                draw(card.querySelector('canvas'), p);
                container.appendChild(card);
            });
        }

        function draw(canv, path) {
            const ctx = canv.getContext('2d'), step = canv.width / 4, pts = {};
            let n = 1;
            for(let y=1; y<=3; y++) for(let x=1; x<=3; x++) pts[n++] = {x:x*step, y:y*step};
            ctx.fillStyle = "#334155";
            for(let i=1; i<=9; i++) { ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, 2, 0, 7); ctx.fill(); }
            ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.lineJoin = "round";
            ctx.beginPath();
            path.forEach((p, i) => { 
                const pt = pts[p];
                if(i===0) {
                    ctx.moveTo(pt.x, pt.y);
                    ctx.fillStyle = "rgba(56, 189, 248, 0.2)";
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, 8, 0, 7); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(pt.x, pt.y);
                } else ctx.lineTo(pt.x, pt.y); 
            });
            ctx.stroke();
        }

        /* --- NUEVAS FUNCIONES DE DATOS --- */

        function exportarDatos() {
            if (usedPatterns.length === 0) return alert("No hay datos para exportar.");
            const dataStr = JSON.stringify(usedPatterns);
            const blob = new Blob([dataStr], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `patrones_usados_${new Date().toISOString().slice(0,10)}.txt`;
            link.click();
        }

        function importarDatos() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            usedPatterns = Array.from(new Set([...usedPatterns, ...imported]));
                            localStorage.setItem('android_pwa_used', JSON.stringify(usedPatterns));
                            alert("Datos importados con éxito.");
                            actualizarContador();
                            if(document.getElementById('results').innerHTML !== "") ejecutar();
                        }
                    } catch (err) { alert("Archivo no válido."); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function limpiarHistorial() {
            if(confirm("¿Reiniciar el registro de patrones usados?")) {
                usedPatterns = []; localStorage.removeItem('android_pwa_used'); 
                actualizarContador();
                if(document.getElementById('results').innerHTML !== "") ejecutar();
            }
        }

        // Inicializar contador al cargar
        actualizarContador();
    </script>
</body>
</html>
